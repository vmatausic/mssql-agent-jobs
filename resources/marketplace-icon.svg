<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a2540"/>
      <stop offset="100%" stop-color="#103a63"/>
    </linearGradient>
    <linearGradient id="db" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f1fa"/>
      <stop offset="100%" stop-color="#b8d4ee"/>
    </linearGradient>
    <linearGradient id="clockface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#2ea043"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="256" height="256" rx="52" fill="url(#bg)"/>

  <!-- database cylinder -->
  <g>
    <path d="M58 78 v92 c0 14 22 25 50 25 s50 -11 50 -25 v-92 z" fill="url(#db)"/>
    <ellipse cx="108" cy="78" rx="50" ry="22" fill="#ffffff"/>
    <!-- cylinder band lines -->
    <path d="M58 110 c0 14 22 25 50 25 s50 -11 50 -25" fill="none" stroke="#7fa8cc" stroke-width="5" stroke-linecap="round"/>
    <path d="M58 140 c0 14 22 25 50 25 s50 -11 50 -25" fill="none" stroke="#7fa8cc" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- clock badge -->
  <g>
    <circle cx="178" cy="172" r="54" fill="url(#clockface)" stroke="#0a2540" stroke-width="10"/>
    <!-- ticks -->
    <line x1="178" y1="128" x2="178" y2="138" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
    <line x1="178" y1="206" x2="178" y2="216" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
    <line x1="134" y1="172" x2="144" y2="172" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
    <line x1="212" y1="172" x2="222" y2="172" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
    <!-- hands -->
    <line x1="178" y1="172" x2="178" y2="142" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
    <line x1="178" y1="172" x2="200" y2="186" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
    <circle cx="178" cy="172" r="7" fill="#ffffff"/>
  </g>
</svg>
